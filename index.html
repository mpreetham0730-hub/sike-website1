<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIKE</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white font-sans">

  <!-- HERO -->
  <section class="relative h-screen flex flex-col justify-center items-center text-center px-6 overflow-hidden">

    <div class="absolute inset-0 bg-cover bg-center opacity-30"
      style="background-image:url('https://images.unsplash.com/photo-1523398002811-999ca8dec234?q=80&w=1974&auto=format&fit=crop')">
    </div>

    <div class="relative z-10 max-w-4xl">

      <h1 class="text-7xl md:text-9xl font-extrabold tracking-[0.3em] uppercase">
        SIKE
      </h1>

      <p class="mt-6 text-lg md:text-2xl text-gray-300 max-w-2xl mx-auto">
        Dark aesthetic streetwear for the new generation.
      </p>

      <div class="mt-10 flex gap-4 flex-wrap justify-center">

        <button class="bg-white text-black px-8 py-4 rounded-2xl text-lg font-semibold">
          Shop Now
        </button>

        <button class="border border-white px-8 py-4 rounded-2xl text-lg font-semibold">
          Explore
        </button>

      </div>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section class="py-24 px-6 md:px-20">

    <h2 class="text-5xl font-bold text-center mb-16">
      Featured Drops
    </h2>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8">

      <div class="bg-zinc-900 rounded-3xl overflow-hidden">
        <img
          src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1887&auto=format&fit=crop"
          class="h-[420px] w-full object-cover"
        />

        <div class="p-6">
          <h3 class="text-2xl font-semibold">
            Rose Oversized Tee
          </h3>

          <p class="text-gray-400 mt-2">
            ₹999
          </p>
        </div>
      </div>

      <div class="bg-zinc-900 rounded-3xl overflow-hidden">
        <img
          src="https://images.unsplash.com/photo-1503341504253-dff4815485f1?q=80&w=1887&auto=format&fit=crop"
          class="h-[420px] w-full object-cover"
        />

        <div class="p-6">
          <h3 class="text-2xl font-semibold">
            Shadow Graphic Tee
          </h3>

          <p class="text-gray-400 mt-2">
            ₹1199
          </p>
        </div>
      </div>

      <div class="bg-zinc-900 rounded-3xl overflow-hidden">
        <img
          src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=1887&auto=format&fit=crop"
          class="h-[420px] w-full object-cover"
        />

        <div class="p-6">
          <h3 class="text-2xl font-semibold">
            Midnight Hoodie
          </h3>

          <p class="text-gray-400 mt-2">
            ₹1899
          </p>
        </div>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="border-t border-zinc-800 py-8 text-center text-gray-500">
    © 2026 SIKE. All rights reserved.
  </footer>

</body>

</html>
