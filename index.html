<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SIKE</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:black;
      color:white;
    }

    nav{
      display:flex;
      justify-content:space-between;
      padding:20px 50px;
      position:fixed;
      width:100%;
      background:rgba(0,0,0,0.8);
      backdrop-filter:blur(10px);
      z-index:1000;
    }

    nav h1{
      letter-spacing:8px;
    }

    nav ul{
      display:flex;
      gap:30px;
      list-style:none;
    }

    nav a{
      color:white;
      text-decoration:none;
    }

    .hero{
      height:100vh;
      background:url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1600&auto=format&fit=crop') center/cover;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      position:relative;
    }

    .hero::after{
      content:'';
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.6);
    }

    .hero-content{
      position:relative;
      z-index:1;
    }

    .hero h2{
      font-size:80px;
      margin-bottom:20px;
    }

    .hero p{
      color:#ccc;
      margin-bottom:30px;
    }

    .btn{
      padding:15px 35px;
      border:none;
      border-radius:40px;
      background:white;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    .products{
      padding:100px 50px;
    }

    .products h3{
      text-align:center;
      font-size:50px;
      margin-bottom:50px;
    }

    .product-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:30px;
    }

    .card{
      background:#111;
      border-radius:20px;
      overflow:hidden;
    }

    .card img{
      width:100%;
      height:350px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .card h4{
      margin-bottom:10px;
    }

    footer{
      text-align:center;
      padding:40px;
      border-top:1px solid #222;
      color:#888;
    }
  </style>
</head>

<body>

  <nav>
    <h1>SIKE</h1>

    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Shop</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <h2>WEAR SIKE</h2>

      <p>Dark aesthetic oversized streetwear brand</p>

      <button class="btn">Shop Now</button>
    </div>
  </section>

  <section class="products">

    <h3>Featured Collection</h3>

    <div class="product-grid">

      <div class="card">
        <img src="images/off white hoddie.jpg">

        <div class="card-content">
          <h4>Rose Oversized Tee</h4>
          <p>₹999</p>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1503341504253-dff4815485f1?q=80&w=1200&auto=format&fit=crop">

        <div class="card-content">
          <h4>Dark Hoodie</h4>
          <p>₹1799</p>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=1200&auto=format&fit=crop">

        <div class="card-content">
          <h4>Minimal Tee</h4>
          <p>₹899</p>
        </div>
      </div>

    </div>
  </section>

  <footer>
    <h2>SIKE</h2>
    <p>Instagram: @sikewear</p>
    <p>© 2026 SIKE. All rights reserved.</p>
  </footer>

</body>
</html>
